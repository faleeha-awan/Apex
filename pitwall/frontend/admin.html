<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitWall Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: rgba(255,255,255,0.08); --text: #e8eaf0; --muted: #7b82a0;
    --accent: #4f8ef7; --success: #34d399; --warning: #fbbf24; --danger: #f87171;
    --radius: 12px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg2); display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4f8ef7, #6c63ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 18px; font-weight: 600; }
  .logo-sub { font-size: 12px; color: var(--muted); }
  a.back { font-size: 13px; color: var(--muted); text-decoration: none; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; }
  a.back:hover { color: var(--text); }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-val { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--muted); }
  .stat-val.warn { color: var(--warning); }
  .stat-val.ok { color: var(--success); }

  h2 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .section { margin-bottom: 32px; }

  .gap-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .gap-card:hover { border-color: rgba(255,255,255,0.15); }
  .gap-question { font-size: 14px; margin-bottom: 4px; }
  .gap-meta { font-size: 12px; color: var(--muted); }
  .gap-desc { font-size: 13px; color: var(--warning); margin-top: 4px; }
  .resolve-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0;
  }
  .resolve-btn:hover { border-color: var(--success); color: var(--success); }

  .source-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  }
  .source-icon { font-size: 16px; }
  .source-name { font-size: 14px; font-weight: 500; }
  .source-meta { font-size: 12px; color: var(--muted); }
  .source-type { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--muted); margin-left: auto; }

  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px; }

  .ingest-btn {
    font-size: 13px; padding: 8px 16px; border-radius: 8px; background: var(--accent);
    border: none; color: #fff; cursor: pointer; font-weight: 500; transition: opacity .15s;
  }
  .ingest-btn:hover { opacity: .85; }
  .ingest-btn:disabled { opacity: .4; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">PitWall Admin</div>
      <div class="logo-sub">Knowledge management</div>
    </div>
  </div>
  <a href="/" class="back">← Back to chat</a>
</header>

<div class="container">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="stat-chunks">—</div><div class="stat-label">Indexed chunks</div></div>
    <div class="stat"><div class="stat-val warn" id="stat-gaps">—</div><div class="stat-label">Open knowledge gaps</div></div>
    <div class="stat"><div class="stat-val ok" id="stat-sources">—</div><div class="stat-label">Document sources</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Knowledge gaps</h2>
      <button class="ingest-btn" id="ingest-btn" onclick="triggerIngest()">Re-ingest docs</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Questions the system couldn't answer — these are docs waiting to be written.</p>
    <div id="gaps-list"><div class="empty">Loading...</div></div>
  </div>

  <div class="section">
    <h2>Indexed sources</h2>
    <div id="sources-list"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
const icons = { github: '📦', pdf: '📄', markdown: '📝', notion: '🗒️' };

async function loadData() {
  const [health, gaps, sources] = await Promise.all([
    fetch('/health').then(r => r.json()),
    fetch('/gaps').then(r => r.json()),
    fetch('/sources').then(r => r.json()),
  ]);

  document.getElementById('stat-chunks').textContent = health.chunks_in_store;
  document.getElementById('stat-gaps').textContent = gaps.total_open;
  document.getElementById('stat-sources').textContent = sources.sources.length;

  renderGaps(gaps.gaps);
  renderSources(sources.sources);
}

function renderGaps(gaps) {
  const el = document.getElementById('gaps-list');
  if (!gaps.length) { el.innerHTML = '<div class="empty">No open knowledge gaps. Great documentation!</div>'; return; }
  el.innerHTML = gaps.map(g => `
    <div class="gap-card" id="gap-${g.id}">
      <div>
        <div class="gap-question">${esc(g.question)}</div>
        ${g.gap_description ? `<div class="gap-desc">${esc(g.gap_description)}</div>` : ''}
        <div class="gap-meta">${g.asked_at.replace('T', ' ').slice(0, 16)} UTC</div>
      </div>
      <button class="resolve-btn" onclick="resolveGap(${g.id})">Mark resolved</button>
    </div>
  `).join('');
}

function renderSources(sources) {
  const el = document.getElementById('sources-list');
  if (!sources.length) { el.innerHTML = '<div class="empty">No documents indexed yet. Run ingestion.</div>'; return; }
  el.innerHTML = sources.map(s => `
    <div class="source-card">
      <div class="source-icon">${icons[s.source_type] || '📄'}</div>
      <div>
        <div class="source-name">${esc(s.source_name)}</div>
        <div class="source-meta">${s.author ? esc(s.author) + ' · ' : ''}${s.date || ''}</div>
      </div>
      <div class="source-type">${esc(s.source_type)}</div>
    </div>
  `).join('');
}

async function resolveGap(id) {
  await fetch(`/gaps/${id}/resolve`, {method: 'POST'});
  document.getElementById(`gap-${id}`).remove();
  const count = document.querySelectorAll('[id^="gap-"]').length;
  document.getElementById('stat-gaps').textContent = count;
  if (!count) document.getElementById('gaps-list').innerHTML = '<div class="empty">No open knowledge gaps. Great documentation!</div>';
}

async function triggerIngest() {
  const btn = document.getElementById('ingest-btn');
  btn.disabled = true;
  btn.textContent = 'Ingesting...';
  try {
    const res = await fetch('/ingest?source=markdown', {method: 'POST'});
    const data = await res.json();
    btn.textContent = `Done — ${data.counts.total} chunks`;
    setTimeout(() => { btn.textContent = 'Re-ingest docs'; btn.disabled = false; loadData(); }, 2000);
  } catch(e) {
    btn.textContent = 'Error'; btn.disabled = false;
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();
</script>
</body>
</html>
